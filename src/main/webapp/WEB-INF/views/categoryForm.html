<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>카테고리 등록 - Product Management</title>

        <style>
            body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; color: #333; }
            h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
            .back-btn { display: inline-block; padding: 8px 16px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 24px; }
            .form-group { margin-bottom: 20px; }
            label { display: block; font-weight: bold; margin-bottom: 6px; }
            input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 1em; box-sizing: border-box; }
            .field-error { border-color: #e74c3c !important; }
            .error-msg { color: #e74c3c; font-size: 0.85em; margin-top: 5px; display: block; }
            .btn-submit { background: #4a90d9; color: white; border: none; padding: 12px 32px; font-size: 1em; border-radius: 4px; cursor: pointer; }
            .required { color: #e74c3c; }
        </style>
    </head>

    <body>
        <div style="padding:8px 16px; font-size:13px; border-bottom:1px solid #ccc; margin-bottom:16px;">
            실습 수행 일시: <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd (EEE) a hh:mm:ss')}"></span>
            &nbsp;|&nbsp; 학번: 2071356 &nbsp;|&nbsp; 성명: 송정은
        </div>

        <h1>카테고리 등록</h1>

        <a class="back-btn" th:href="@{/categories}">← 목록으로 돌아가기</a>

        <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
            <div class="form-group">
                <label>카테고리명 <span class="required">*</span></label>
                <input type="text"
                       th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'field-error'"
                       placeholder="카테고리명을 입력하세요" />
                <span class="error-msg"
                      th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}">오류 메시지</span>
            </div>
            <div class="form-group">
                <button type="submit" class="btn-submit">등록</button>
            </div>
        </form>
    </body>
</html>
